<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liberandos Archive / Mobile Drift</title>
  <style>
    :root {
      --bg: #06070a;
      --fg: #eaeaea;
      --muted: rgba(235,235,235,0.72);
      --soft: rgba(220,220,220,0.56);
      --line: rgba(255,255,255,0.14);
      --link: rgba(210,220,255,0.84);
      --max: 420px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: monospace;
      overflow-x: hidden;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 56%, rgba(6,7,10,0.5) 100%);
      z-index: 50;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      position: relative;
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 14px 90px;
      z-index: 1;
    }

    .hud {
      position: fixed;
      left: 14px;
      top: 14px;
      z-index: 40;
      display: inline-block;
      margin-bottom: 0;
      padding: 8px 10px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.96);
      background: rgba(6,7,10,0.62);
      border: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }

    .opening {
      display: none;
    }

    .eyebrow {
      margin-bottom: 8px;
      font-size: 10px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--soft);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 20px;
      line-height: 1.15;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .subhead {
      margin: 0;
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
    }

    .opening-node {
      min-height: 100svh;
      display: block;
      opacity: 1;
      transition: opacity 500ms ease, transform 500ms ease;
      padding: 24px 0;
    }

    .opening-node .media-frame {
      aspect-ratio: 4 / 5;
      min-height: 58svh;
      max-height: 74svh;
    }

    .archive-stream {
      opacity: 0;
      pointer-events: none;
      transition: opacity 900ms ease;
      margin-top: 0;
    }

    .archive-stream.is-live {
      opacity: 1;
      pointer-events: auto;
    }

    .opening-node > *,
    .archive-stream > * {
      display: block;
      width: 100%;
      max-width: 100%;
      clear: both;
    }

    .opening-spacer {
      height: 62svh;
    }

    .opening-tail {
      height: 52svh;
    }

    .node {
      display: block;
      margin-bottom: 28px;
      opacity: 0;
      transform: translateY(18px) scale(0.985);
      transition: opacity 700ms ease, transform 700ms ease, filter 700ms ease;
    }

    .node.is-visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .node.degrade-1 {
      filter: contrast(0.85) saturate(0.55) brightness(0.9);
      opacity: 0.8;
      transform: translateY(4px) scale(0.98);
    }

    .node.degrade-2 {
      filter: contrast(0.65) saturate(0.35) brightness(0.85) blur(0.6px);
      margin-bottom: 90px;
      opacity: 0.55;
      transform: translateY(6px) scale(0.95) rotate(-0.3deg);
    }

    .node.degrade-1 .caption,
    .node.degrade-1 .buffer-note {
      opacity: 0.58;
    }

    .node.degrade-2 .caption,
    .node.degrade-2 .buffer-note,
    .node.degrade-2 .linkrow {
      opacity: 0.18;
    }

    .node.large { width: 100%; }
    .node.medium { width: min(100%, 340px); }
    .node.small { width: min(82%, 250px); }

    .node.align-left {
      margin-left: 0;
      margin-right: auto;
    }

    .node.align-center {
      margin-left: auto;
      margin-right: auto;
    }

    .node.align-right {
      margin-left: auto;
      margin-right: 0;
    }

    .card {
      border: 1px solid rgba(255,255,255,0.08);
      padding: 10px 10px 12px;
      background: rgba(255,255,255,0.01);
    }

    .record-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 10px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--soft);
    }

    .record-label {
      color: rgba(255,255,255,0.92);
    }

    .media-frame {
      width: 100%;
      aspect-ratio: 4 / 5;
      overflow: hidden;
      background: transparent;
    }

    .media-frame.portrait {
      aspect-ratio: 4 / 5;
    }

    .media-frame.landscape {
      aspect-ratio: 16 / 9;
    }

    .media-frame.square {
      aspect-ratio: 1 / 1;
    }

    .media-frame img,
    .media-frame video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }

    .caption {
      padding-top: 8px;
      font-size: 10px;
      line-height: 1.4;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .caption-title {
      margin-bottom: 3px;
      color: rgba(255,255,255,0.92);
    }

    .caption-meta {
      color: var(--soft);
    }

    .phase-text {
      white-space: pre-line;
      line-height: 1.5;
      color: rgba(238,238,238,0.92);
      font-size: 12px;
    }

    .record-copy {
      margin: 10px 0 0;
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
    }

    .linkrow {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-top: 10px;
    }

    .archive-link {
      color: var(--link);
      border-bottom: 1px solid rgba(210,220,255,0.3);
      padding-bottom: 1px;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .tiny {
      font-size: 10px;
      line-height: 1.45;
      color: var(--soft);
    }

    .buffer-note {
      margin-top: 6px;
      font-size: 9px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(220,220,220,0.5);
    }

    .hidden-audio {
      display: none;
    }
  </style>
</head>

    function createNodeElement(node) {
      const article = document.createElement('article');
      const degradeClass = node.degradeLevel === 1 ? 'degrade-1' : node.degradeLevel === 2 ? 'degrade-2' : '';
      article.className = `node ${node.size || 'medium'} align-${node.align || 'center'} ${degradeClass}`.trim();
      article.dataset.nodeId = node.id;
      article.dataset.kind = node.kind;

      const card = document.createElement('div');
      card.className = 'card';
      article.appendChild(card);

      const header = document.createElement('div');
      header.className = 'record-header';
      header.innerHTML = `
        <div class="record-label">${node.title || node.id}</div>
        <div>${node.kind}</div>
      `;
      card.appendChild(header);

      if (node.kind === 'image' || node.kind === 'video') {
        const frame = document.createElement('div');
        frame.className = `media-frame ${node.mediaClass || ''}`.trim();
        const media = createMediaElement(node);
        frame.appendChild(media);
        card.appendChild(frame);

        const note = document.createElement('div');
        note.className = 'buffer-note';
        note.textContent = node.meta || '';
        card.appendChild(note);
      }

      if (node.kind === 'text') {
        const text = document.createElement('div');
        text.className = 'phase-text';
        text.textContent = node.text || '';
        card.appendChild(text);
      }

      if (node.kind === 'link') {
        const meta = document.createElement('div');
        meta.className = 'phase-text';
        meta.textContent = node.meta || '';
        card.appendChild(meta);
      }


      if (node.linkTargets && node.linkTargets.length) {
        const row = document.createElement('div');
        row.className = 'linkrow';
        node.linkTargets.forEach(link => {
          const a = document.createElement('a');
          a.className = 'archive-link';
          a.href = link.href;
          a.textContent = link.label;
          if (link.external) {
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
          }
          row.appendChild(a);
        });
        card.appendChild(row);
      }

      return article;
    }

    function createMediaElement(node) {
      if (node.kind === 'image') {
        const img = document.createElement('img');
        img.loading = 'lazy';
        img.src = node.src;
        img.alt = node.title || node.id;
        return img;
      }

      const video = document.createElement('video');
      video.muted = true;
      video.defaultMuted = true;
      video.loop = true;
      video.playsInline = true;
      video.setAttribute('muted', '');
      video.setAttribute('loop', '');
      video.setAttribute('playsinline', '');
      video.setAttribute('webkit-playsinline', '');
      video.preload = (node.id === OPENING_PRIORITY_VIDEO_ID || node.preloadPriority) ? 'auto' : 'metadata';
      video.src = node.src;
      const playbackBase = node.playbackRateBase || 1;
      if (node.degradeLevel === 1) {
        video.playbackRate = (0.55 + Math.random() * 0.15) * playbackBase;
        video.currentTime = Math.random() * 2;
      } else if (node.degradeLevel === 2) {
        video.playbackRate = (0.35 + Math.random() * 0.15) * playbackBase;
        video.currentTime = Math.random() * 3;
      } else {
        video.playbackRate = 1 * playbackBase;
      }
      if (!node.useFirstFramePoster) {
        video.poster = node.poster || MEDIA.screenshot1.src;
      }
      return video;
    }

    function cloneWithDegrade(node, level) {
      return {
        ...node,
        id: `${node.id}-echo-${level}-${Math.random().toString(36).slice(2, 7)}`,
        degradeLevel: level
      };
    }

function renderOpeningNode() {
  const centerNode = MOBILE_NODES.find(n => n.id === OPENING_PRIORITY_VIDEO_ID);
  if (!centerNode) return;

  openingNodeEl.innerHTML = '';

  const centerEl = createNodeElement({ ...centerNode, degradeLevel: 0 });
  centerEl.id = 'mmnt-anchor';
  openingNodeEl.appendChild(centerEl);
  centerEl.classList.add('is-visible');
}

    function renderArchiveStream() {
      const primaryOrder = [
        'mobile-video-e9fc-surface',

        'mobile-still-0053',
        'mobile-video-carapace'
      ];

      const primaryNodes = primaryOrder
        .map(id => MOBILE_NODES.find(n => n.id === id))
        .filter(Boolean);

      primaryNodes.forEach(n => {
        archiveStreamEl.appendChild(createNodeElement({ ...n, degradeLevel: 0 }));
      });

      const echoSourceIds = [
        'mobile-video-e9fc-surface',
        'mobile-video-mirrored',
        'mobile-video-output',
        'mobile-video-3644',
        'mobile-video-carapace',
        'mobile-still-0053'
      ];

      const echoSources = echoSourceIds
        .map(id => MOBILE_NODES.find(n => n.id === id))
        .filter(Boolean);

      echoSources.forEach(n => {
        archiveStreamEl.appendChild(createNodeElement(cloneWithDegrade(n, 1)));
      });

      echoSources.forEach(n => {
        archiveStreamEl.appendChild(createNodeElement(cloneWithDegrade(n, 2)));
      });

      // deep tail (sparse, collapsing signal)
      const tailIds = [
        'mobile-video-e9fc-surface',
        'mobile-video-mirrored',
        'mobile-video-output'
      ];

      const tailNodes = tailIds
        .map(id => MOBILE_NODES.find(n => n.id === id))
        .filter(Boolean);

      tailNodes.forEach(n => {
        archiveStreamEl.appendChild(createNodeElement(cloneWithDegrade(n, 2)));
      });
    }

    function revealArchiveStream() {
      if (archiveRevealed) return;
      archiveRevealed = true;
      archiveStreamEl.classList.add('is-live');
      observeNodeVisibility();
      observeActiveVideo();
    }

    function observeNodeVisibility() {
      const nodes = Array.from(document.querySelectorAll('.node'));
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
          }
        });
      }, {
        threshold: 0.16,
        rootMargin: '0px 0px -6% 0px'
      });

      nodes.forEach(node => observer.observe(node));
    }

    function ensureVideoPrimed(video) {
      if (!video) return;
      if (video.dataset.loadRequested === 'true') return;
      video.dataset.loadRequested = 'true';
      video.preload = 'auto';
      try { video.load(); } catch (e) {}
    }

    function observeActiveVideo() {
      const videos = Array.from(document.querySelectorAll('video'));
      if (!videos.length) return;

      function updateActiveVideo() {
        let best = null;
        let bestDist = Infinity;

        videos.forEach(video => {
          const rect = video.getBoundingClientRect();
          const centerY = rect.top + rect.height / 2;
          const dist = Math.abs(centerY - window.innerHeight / 2);
          const isNear = rect.bottom > -window.innerHeight * 0.35 && rect.top < window.innerHeight * 1.35;
          const isPreloadZone = rect.bottom > -window.innerHeight * 0.75 && rect.top < window.innerHeight * 1.75;

          if (isPreloadZone && video.readyState < 2) {
            ensureVideoPrimed(video);
          }

          if (isNear && dist < bestDist) {
            best = video;
            bestDist = dist;
          }
        });

        videos.forEach(video => {
          if (video === best) {
            if (video.readyState < 2) {
              ensureVideoPrimed(video);
            }
            if (video.paused) {
              video.play().catch(() => {});
            }
          } else if (!video.paused) {
            video.pause();
          }
        });
      }

      window.addEventListener('scroll', updateActiveVideo, { passive: true });
      window.addEventListener('resize', updateActiveVideo);
      updateActiveVideo();
    }

    function initAudioSources() {
      audioBedEl.src = 'dnbd.m4a';
      audioLayerAEl.src = 'dnbd.m4a';
      audioBedEl.load();
      audioLayerAEl.load();
    }

    function setStatus(text) {
      statuslineEl.textContent = text;
    }

    function triggerAudioGestureStart() {
      if (audioStarted) return;
      startAudio();
    }

    function fadeAudio(audioEl, from, to, duration, onDone) {
      const start = performance.now();
      function step(now) {
        const progress = Math.min((now - start) / duration, 1);
        audioEl.volume = from + (to - from) * progress;
        if (progress < 1) {
          requestAnimationFrame(step);
        } else if (onDone) {
          onDone();
        }
      }
      requestAnimationFrame(step);
    }

    function forceDNBDHandoff() {
      if (dnbdIsCrossfading) return;

      const active = dnbdActiveDeck === 'A' ? audioBedEl : audioLayerAEl;
      const next = dnbdActiveDeck === 'A' ? audioLayerAEl : audioBedEl;

      dnbdIsCrossfading = true;
      next.pause();
      next.currentTime = 0;
      next.volume = 0;
      next.muted = false;

      next.play().then(() => {
        fadeAudio(next, 0, 0.26, 600);
        fadeAudio(active, active.volume, 0, 600, () => {
          active.pause();
          active.currentTime = 0;
        });
        window.setTimeout(() => {
          dnbdActiveDeck = dnbdActiveDeck === 'A' ? 'B' : 'A';
          dnbdIsCrossfading = false;
        }, 650);
      }).catch(() => {
        dnbdIsCrossfading = false;
      });
    }

    function startDNBDCrossfadeLoop() {
      if (dnbdCrossfadeInterval) clearInterval(dnbdCrossfadeInterval);

      dnbdCrossfadeInterval = window.setInterval(() => {
        const active = dnbdActiveDeck === 'A' ? audioBedEl : audioLayerAEl;
        const next = dnbdActiveDeck === 'A' ? audioLayerAEl : audioBedEl;

        if (dnbdIsCrossfading) return;
        if (!active.duration || !isFinite(active.duration)) return;

        const remaining = active.duration - active.currentTime;
        if (remaining <= 6.5) {
          dnbdIsCrossfading = true;
          next.pause();
          next.currentTime = 0;
          next.volume = 0;
          next.muted = false;
          next.play().then(() => {
            fadeAudio(next, 0, 0.26, 5500);
            fadeAudio(active, active.volume, 0, 5500, () => {
              active.pause();
              active.currentTime = 0;
            });
            window.setTimeout(() => {
              dnbdActiveDeck = dnbdActiveDeck === 'A' ? 'B' : 'A';
              dnbdIsCrossfading = false;
            }, 5600);
          }).catch(() => {
            dnbdIsCrossfading = false;
          });
        }
      }, 250);
    }

    function startAudio() {
      if (audioStarted) return;
      audioStarted = true;

      audioBedEl.pause();
      audioLayerAEl.pause();
      try { audioBedEl.load(); } catch (e) {}
      try { audioLayerAEl.load(); } catch (e) {}
      audioBedEl.currentTime = 0;
      audioLayerAEl.currentTime = 0;
      audioBedEl.muted = false;
      audioLayerAEl.muted = false;
      audioBedEl.loop = false;
      audioLayerAEl.loop = false;
      audioBedEl.volume = 0;
      audioLayerAEl.volume = 0;
      dnbdActiveDeck = 'A';
      dnbdIsCrossfading = false;
      audioBedEl.onended = forceDNBDHandoff;
      audioLayerAEl.onended = forceDNBDHandoff;

      audioBedEl.play().then(() => {
        const openingVideo = openingNodeEl.querySelector('video');
        if (openingVideo) {
          ensureVideoPrimed(openingVideo);
          openingVideo.play().catch(() => {});
        }

        fadeAudio(audioBedEl, 0, 0.26, 900);
        startDNBDCrossfadeLoop();
        setStatus('receiver engaged / dnbd loop active');
        window.setTimeout(() => {
          revealArchiveStream();
        }, 2100);
      }).catch((err) => {
        console.error('DNBD start failed', err);
        setStatus('audio blocked / tap again');
        audioStarted = false;
      });
    }

    function initMobileArchive() {
      MOBILE_NODES = createMobileNodes();
      initAudioSources();
      renderOpeningNode();
      renderArchiveStream();
      observeNodeVisibility();
      window.addEventListener('click', triggerAudioGestureStart, { once: false });
      window.addEventListener('touchstart', triggerAudioGestureStart, { once: false, passive: true });
    }

    initMobileArchive();
  </script>
</body>
</html>
