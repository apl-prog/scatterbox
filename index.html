  <style>
    /* =========================
       1. PAGE SHELL
       ========================= */
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #06070a;
      color: #eaeaea;
      font-family: monospace;
    }

    #viewport {
      position: fixed;
      inset: 0;
      overflow: hidden;
      cursor: grab;
      background: #06070a;
    }

    #viewport::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 58%, rgba(6,7,10,0.52) 100%);
      z-index: 998;
    }

    #world {
      position: absolute;
      top: 0;
      left: 0;
      will-change: transform;
      transform-origin: 0 0;
    }

    #hud {
      position: fixed;
      left: 16px;
      top: 16px;
      z-index: 1001;
      pointer-events: none;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.96);
      background: rgba(6,7,10,0.55);
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.14);
    }

    #statusline {
      opacity: 1;
      text-shadow: 0 0 8px rgba(0,0,0,0.45);
    }

    /* =========================
       2. NODE STYLING
       ========================= */
    .node {
      position: absolute;
      box-sizing: border-box;
    }

    .node-core {
      z-index: 20;
    }

    .node-echo {
      z-index: 10;
      pointer-events: none;
    }

    .node-image,
    .node-video,
    .node-text,
    .node-link,
    .node-hybrid {
      display: block;
    }

    .media-frame {
      width: 100%;
      overflow: hidden;
      background: transparent;
    }

    .media-frame img,
    .media-frame video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .caption {
      padding-top: 8px;
      color: rgba(235,235,235,0.78);
      font-size: 10px;
      line-height: 1.4;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .caption-title {
      color: rgba(255,255,255,0.92);
      margin-bottom: 3px;
    }

    .caption-meta {
      color: rgba(220,220,220,0.56);
    }

    .caption-minimal {
      padding-top: 4px;
      font-size: 8px;
      color: rgba(220,220,220,0.52);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .overlay-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-top: 8px;
      pointer-events: auto;
    }

    .overlay-links a {
      color: rgba(210,220,255,0.84);
      text-decoration: none;
      border-bottom: 1px solid rgba(210,220,255,0.3);
      padding-bottom: 1px;
    }

    .phase-text {
      white-space: pre-line;
      line-height: 1.45;
      color: rgba(235,235,235,0.88);
    }

    .hidden-audio {
      display: none;
    }
  </style>

    /* =========================
       8. ECHO GENERATION
       Generate echoes from core node data.
       ========================= */
    function generateEchoNodes(coreNodes) {
      const echoes = [];

      coreNodes.forEach((node, index) => {
        const ringSpecs = [
          { depth: 1, count: 2, range: ECHO_RING_1 },
          { depth: 2, count: 2, range: ECHO_RING_2 },
          { depth: 3, count: 1, range: ECHO_RING_3 }
        ];

        ringSpecs.forEach(spec => {
          for (let i = 0; i < spec.count; i++) {
            const angle = chooseEchoAngle(index, spec.depth, i);
            const radius = chooseEchoRadius(spec.range);
            const scale = chooseEchoScale(spec.depth);
            const pos = projectFrom(node.x, node.y, angle, radius);

            echoes.push({
              ...node,
              id: `${node.id}-echo-${spec.depth}-${i}`,
              zone: 'echo',
              echoDepth: spec.depth,
              x: pos.x,
              y: pos.y,
              w: Math.max(90, Math.round(node.w * scale)),
              h: node.h ? Math.max(60, Math.round(node.h * scale)) : undefined,
              captionMode: spec.depth === 1 ? 'minimal' : 'none',
              linkTargets: [],
              opacityBias: chooseEchoOpacity(spec.depth),
              rotationBias: chooseEchoRotation(spec.depth),
              scaleBias: scale
            });
          }
        });
      });

      return echoes;
    }

    function chooseEchoAngle(index, depth, iteration) {
      const base = ((index * 47) + (depth * 73) + (iteration * 131)) % 360;
      const jitter = (Math.random() * 24) - 12;
      return ((base + jitter) * Math.PI) / 180;
    }

    function chooseEchoRadius([min, max]) {
      return min + Math.random() * (max - min);
    }

    function chooseEchoScale(depth) {
      if (depth === 1) return 0.8 + Math.random() * 0.45;
      if (depth === 2) return 0.6 + Math.random() * 0.9;
      return 0.4 + Math.random() * 1.2;
    }

    function chooseEchoOpacity(depth) {
      if (depth === 1) return 0.34;
      if (depth === 2) return 0.22;
      return 0.14;
    }

    function chooseEchoRotation(depth) {
      const max = depth === 1 ? 6 : depth === 2 ? 12 : 18;
      return (-max + Math.random() * max * 2);
    }

    function projectFrom(x, y, angle, radius) {
      return {
        x: Math.round(x + Math.cos(angle) * radius),
        y: Math.round(y + Math.sin(angle) * radius)
      };
    }

    /* =========================
       9. RENDERING
       Render all nodes from data.
       ========================= */
    function renderAllNodes(nodes) {
      worldEl.innerHTML = '';
      NODE_ELEMENTS.clear();

      nodes.forEach(node => {
        const el = createNodeElement(node);
        worldEl.appendChild(el);
        NODE_ELEMENTS.set(node.id, el);
      });
    }

    function createNodeElement(node) {
      const el = document.createElement('article');
      el.className = [
        'node',
        node.zone === 'core' ? 'node-core' : 'node-echo',
        `node-${node.kind}`
      ].join(' ');

      const renderWidth = getNodeRenderWidth(node);
      const renderHeight = getNodeRenderHeight(node);
      el.style.left = `${node.x}px`;
      el.style.top = `${node.y}px`;
      el.style.width = `${renderWidth}px`;
      if (node.h) el.style.minHeight = `${renderHeight}px`;

      const mediaOrText = createNodeBody(node);
      if (mediaOrText) el.appendChild(mediaOrText);

      const caption = createCaptionElement(node);
      if (caption) el.appendChild(caption);

      return el;
    }

    function createNodeBody(node) {
      if (node.kind === 'image' || node.kind === 'video') {
        const frame = document.createElement('div');
        frame.className = 'media-frame';
        frame.style.aspectRatio = node.h ? `${getNodeRenderWidth(node)} / ${getNodeRenderHeight(node)}` : '16 / 9';

        const media = createMediaElement(node);
        frame.appendChild(media);
        return frame;
      }

      if (node.kind === 'text') {
        const text = document.createElement('div');
        text.className = 'phase-text';
        text.textContent = node.text || '';
        return text;
      }

      if (node.kind === 'link') {
        const wrapper = document.createElement('div');
        wrapper.className = 'phase-text';
        wrapper.textContent = node.meta || '';
        const links = createLinkRow(node);
        if (links) wrapper.appendChild(links);
        return wrapper;
      }

      return null;
    }

    function createMediaElement(node) {
      if (node.kind === 'image') {
        const img = document.createElement('img');
        img.loading = 'lazy';
        img.src = node.src;
        img.alt = node.title || node.id;
        img.style.objectFit = node.mediaFit || 'contain';
        return img;
      }

      const video = document.createElement('video');
      video.muted = true;
      video.defaultMuted = true;
      video.autoplay = false;
      video.loop = true;
      video.playsInline = true;
      video.setAttribute('muted', '');
      video.setAttribute('loop', '');
      video.setAttribute('playsinline', '');
      video.setAttribute('webkit-playsinline', '');
      video.preload = (node.id === OPENING_PRIORITY_VIDEO_ID || node.isOpeningAnchor) ? 'auto' : 'metadata';
      video.src = node.src;
      if (node.useFirstFramePoster) {
        video.removeAttribute('poster');
      } else if (node.poster) {
        video.poster = node.poster;
      } else {
        video.poster = MEDIA.screenshot1.src;
      }
      video.style.objectFit = node.mediaFit || 'contain';
      return video;
    }

    function createCaptionElement(node) {
      if (node.captionMode === 'none') return null;

      const caption = document.createElement('div');
      caption.className = node.captionMode === 'minimal' ? 'caption-minimal' : 'caption';

      if (node.captionMode === 'minimal') {
        caption.textContent = (node.meta || node.title || node.id).toLowerCase();
        return caption;
      }

      const title = document.createElement('div');
      title.className = 'caption-title';
      title.textContent = node.title || node.id;

      const meta = document.createElement('div');
      meta.className = 'caption-meta';
      meta.textContent = node.meta || '';

      caption.appendChild(title);
      caption.appendChild(meta);

      const links = createLinkRow(node);
      if (links) caption.appendChild(links);

      return caption;
    }

    function createLinkRow(node) {
      if (!node.linkTargets || !node.linkTargets.length) return null;
      const row = document.createElement('div');
      row.className = 'overlay-links';

      node.linkTargets.forEach(link => {
        const a = document.createElement('a');
        a.href = link.href;
        a.textContent = link.label;
        if (link.external) {
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
        }
        row.appendChild(a);
      });

      return row;
    }

    /* =========================
       10. CAMERA SYSTEM
       ========================= */
    function clampCamera() {
      const maxX = Math.max(0, WORLD_WIDTH - viewportEl.clientWidth);
      const maxY = Math.max(0, WORLD_HEIGHT - viewportEl.clientHeight);
      state.cameraX = Math.max(0, Math.min(state.cameraX, maxX));
      state.cameraY = Math.max(0, Math.min(state.cameraY, maxY));
    }

    function setCamera(x, y) {
      state.cameraX = x;
      state.cameraY = y;
      clampCamera();
      renderCamera();
    }

    function centerCameraOnCoreCluster() {
      if (!CORE_NODES.length) return;

      const openingNodes = CORE_NODES.filter(node => node.isOpeningAnchor);
      const targetNodes = openingNodes.length ? openingNodes : CORE_NODES;

      let minX = Infinity;
      let minY = Infinity;
      let maxX = -Infinity;
      let maxY = -Infinity;

      targetNodes.forEach(node => {
        const renderWidth = getNodeRenderWidth(node);
        const renderHeight = getNodeRenderHeight(node);
        const nodeRight = node.x + renderWidth;
        const nodeBottom = node.y + renderHeight;
        minX = Math.min(minX, node.x);
        minY = Math.min(minY, node.y);
        maxX = Math.max(maxX, nodeRight);
        maxY = Math.max(maxY, nodeBottom);
      });

      const clusterCenterX = (minX + maxX) / 2;
      const clusterCenterY = (minY + maxY) / 2;

      state.cameraX = Math.round(clusterCenterX - viewportEl.clientWidth / 2 + 180);
      state.cameraY = Math.round(clusterCenterY - viewportEl.clientHeight / 2 + 40);
      clampCamera();
    }

    function panCameraBy(dx, dy) {
      state.cameraX += dx;
      state.cameraY += dy;
      clampCamera();
      renderCamera();
    }

    function renderCamera() {
      worldEl.style.transform = `translate(${-state.cameraX}px, ${-state.cameraY}px)`;
      updateNodeAppearance();
      startVisibleVideos();
    }

    function startVisibleVideos() {
      const viewportPadding = 40;
      const candidates = [];

      ALL_NODES.forEach(node => {
        if (node.kind !== 'video') return;
        const el = NODE_ELEMENTS.get(node.id);
        if (!el) return;

        const rect = el.getBoundingClientRect();
        const isVisible = (
          rect.right >= -viewportPadding &&
          rect.left <= window.innerWidth + viewportPadding &&
          rect.bottom >= -viewportPadding &&
          rect.top <= window.innerHeight + viewportPadding
        );

        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const dx = centerX - window.innerWidth / 2;
        const dy = centerY - window.innerHeight / 2;
        const centerDist = Math.sqrt(dx * dx + dy * dy);
        const activeRadius = Math.min(window.innerWidth, window.innerHeight) * 0.42;
        const shouldActivelyPlay = isVisible && centerDist < activeRadius;

        const video = el.querySelector('video');
        if (!video) return;

        candidates.push({ node, video, shouldActivelyPlay, centerDist });
      });

      candidates.sort((a, b) => {
        const aPriority = a.node.id === OPENING_PRIORITY_VIDEO_ID ? -1 : 0;
        const bPriority = b.node.id === OPENING_PRIORITY_VIDEO_ID ? -1 : 0;
        if (aPriority !== bPriority) return aPriority - bPriority;
        return a.centerDist - b.centerDist;
      });

      let startedCount = 0;

      candidates.forEach(({ node, video, shouldActivelyPlay }) => {
        const canRun = shouldActivelyPlay && startedCount < 2;

        if (canRun) {
          if (video.readyState < 2) {
            video.preload = 'auto';
            try { video.load(); } catch (e) {}
          }
          if (video.paused) {
            video.play().catch(() => {});
          }
          startedCount += 1;
        } else {
          if (!video.paused) {
            video.pause();
          }
        }
      });
    }

    /* =========================
       11. INTERACTION SYSTEM
       ========================= */
    function bindInteraction() {
      viewportEl.addEventListener('pointerdown', onPointerDown);
      viewportEl.addEventListener('pointermove', onPointerMove);
      viewportEl.addEventListener('pointerup', onPointerUp);
      viewportEl.addEventListener('pointercancel', onPointerUp);
      viewportEl.addEventListener('wheel', onWheelPan, { passive: false });

      document.querySelectorAll('a').forEach(a => {
        a.addEventListener('pointerdown', e => {
          e.stopPropagation();
        });
      });

      window.addEventListener('keydown', event => {
        const step = 80;
        if (event.key === 'ArrowLeft') panCameraBy(-step, 0);
        if (event.key === 'ArrowRight') panCameraBy(step, 0);
        if (event.key === 'ArrowUp') panCameraBy(0, -step);
        if (event.key === 'ArrowDown') panCameraBy(0, step);
      });

      window.addEventListener('click', triggerAudioGestureStart, { once: false });
      window.addEventListener('touchstart', triggerAudioGestureStart, { once: false, passive: true });
      window.addEventListener('keydown', triggerAudioGestureStart, { once: false });
    }

    function onPointerDown(event) {
      if (event.target.closest('a')) return;
      state.isDragging = true;
      state.dragStartX = event.clientX;
      state.dragStartY = event.clientY;
      viewportEl.setPointerCapture(event.pointerId);
      triggerAudioGestureStart();
    }

    function onPointerMove(event) {
      if (!state.isDragging) return;
      const dx = event.clientX - state.dragStartX;
      const dy = event.clientY - state.dragStartY;
      state.dragStartX = event.clientX;
      state.dragStartY = event.clientY;
      panCameraBy(-dx, -dy);
    }

    function onPointerUp() {
      state.isDragging = false;
    }

    function onWheelPan(event) {
      event.preventDefault();
      panCameraBy(event.deltaX, event.deltaY);
      triggerAudioGestureStart();
    }

    /* =========================
       12. DEGRADATION SYSTEM
       ========================= */
    function updateNodeAppearance() {
      const viewportCenterX = viewportEl.clientWidth / 2;
      const viewportCenterY = viewportEl.clientHeight / 2;
      const maxDist = Math.sqrt(viewportCenterX ** 2 + viewportCenterY ** 2) * 1.9;

      ALL_NODES.forEach(node => {
        const el = NODE_ELEMENTS.get(node.id);
        if (!el) return;

        const renderWidth = getNodeRenderWidth(node);
        const renderHeight = getNodeRenderHeight(node);
        const nodeScreenX = node.x - state.cameraX + renderWidth / 2;
        const nodeScreenY = node.y - state.cameraY + renderHeight / 2;

        const dx = nodeScreenX - viewportCenterX;
        const dy = nodeScreenY - viewportCenterY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const distanceFactor = Math.min(dist / maxDist, 1);

        const cullMultiplier = node.id === OPENING_PRIORITY_VIDEO_ID ? 2.2 : 1.4;
        if (
          nodeScreenX < -renderWidth * cullMultiplier ||
          nodeScreenX > viewportEl.clientWidth + renderWidth * cullMultiplier ||
          nodeScreenY < -renderHeight * cullMultiplier ||
          nodeScreenY > viewportEl.clientHeight + renderHeight * cullMultiplier
        ) {
          el.style.opacity = '0';
          return;
        }

        const appearance = computeNodeAppearance(node, distanceFactor);
        applyAppearanceToElement(node, el, appearance);
      });
    }

    function computeNodeAppearance(node, distanceFactor) {
      const echoFactor = node.echoDepth * 0.22;
      const openingBoost = node.isOpeningAnchor ? 0.16 : 0;
      const openingVideoBoost = node.isOpeningAnchor && node.kind === 'video' ? 0.14 : 0;
      const blur = Math.max(0, distanceFactor * 1.9 + echoFactor * 1.4 - openingBoost * 1.2 - openingVideoBoost * 0.8);
      const brightness = 1 - distanceFactor * 0.26 - echoFactor * 0.18 + openingBoost + openingVideoBoost * 0.6;
      const contrast = 1 + distanceFactor * 0.24 + echoFactor * 0.18 + openingBoost * 0.22 + openingVideoBoost * 0.28;
      const saturate = Math.max(0.18, 1 - distanceFactor * 0.72 - echoFactor * 0.55 + openingBoost * 0.25 + openingVideoBoost * 0.45);
      const opacityFloor = node.zone === 'echo' ? 0 : 0.68;
      const opacityBase = (node.opacityBias ?? 1) + openingBoost;
      const opacity = Math.max(opacityFloor, opacityBase - distanceFactor * (node.zone === 'echo' ? 0.7 : 0.26));
      const jitterX = (Math.random() - 0.5) * distanceFactor * (node.zone === 'echo' ? 2.4 : 0.45);
      const jitterY = (Math.random() - 0.5) * distanceFactor * (node.zone === 'echo' ? 2.0 : 0.35);
      const scale = 1 - distanceFactor * (node.zone === 'echo' ? 0.1 : 0.025);
      const dropout = shouldDropNode(node, distanceFactor);

      return {
        blur,
        brightness,
        contrast,
        saturate,
        opacity: dropout ? 0 : opacity,
        jitterX,
        jitterY,
        scale,
        playbackRate: Math.max(0.55, 1 - distanceFactor * 0.28 - echoFactor * 0.12)
      };
    }

    function shouldDropNode(node, distanceFactor) {
      if (node.zone !== 'echo') return false;
      if (distanceFactor < 0.72) return false;
      const chance = 0.08 + (distanceFactor - 0.72) * 0.9 + node.echoDepth * 0.08;
      return Math.random() < chance;
    }

    function applyAppearanceToElement(node, el, appearance) {
      el.style.opacity = String(appearance.opacity);
      const rotation = (node.kind === 'text' || node.kind === 'link') ? 0 : (node.rotationBias || 0);
      el.style.transform = `translate(${appearance.jitterX}px, ${appearance.jitterY}px) rotate(${rotation}deg)`;

      const media = el.querySelector('img, video');
      if (media) {
        media.style.filter = `brightness(${appearance.brightness}) contrast(${appearance.contrast}) saturate(${appearance.saturate}) blur(${appearance.blur}px)`;
        media.style.transform = `scale(${appearance.scale})`;

        if (media.tagName === 'VIDEO') {
          const base = node.playbackRateBase || 1;
          media.playbackRate = Math.max(0.25, appearance.playbackRate * base);
        }
      }
    }

    /* =========================
       13. AUDIO SYSTEM
       ========================= */
    function initAudioSources() {
      audioBedEl.src = 'dnbd.m4a';
      audioLayerAEl.src = 'dnbd.m4a';
      audioLayerBEl.removeAttribute('src');
      audioBedEl.load();
      audioLayerAEl.load();
    }

    function triggerAudioGestureStart() {
      if (state.audioStarted) return;
      startAudio();
    }

    function startAudio() {
      if (state.audioStarted) return;
      state.audioStarted = true;

      audioBedEl.pause();
      audioLayerAEl.pause();
      try { audioBedEl.load(); } catch (e) {}
      try { audioLayerAEl.load(); } catch (e) {}
      audioBedEl.currentTime = 0;
      audioLayerAEl.currentTime = 0;
      audioBedEl.muted = false;
      audioLayerAEl.muted = false;
      audioBedEl.loop = false;
      audioLayerAEl.loop = false;
      audioBedEl.volume = 0;
      audioLayerAEl.volume = 0;
      dnbdActiveDeck = 'A';
      dnbdIsCrossfading = false;

      audioBedEl.onended = forceDNBDHandoff;
      audioLayerAEl.onended = forceDNBDHandoff;

      audioBedEl.play().then(() => {
        fadeAudio(audioBedEl, 0, 0.26, 900);
        startDNBDCrossfadeLoop();
        setStatus('receiver engaged / dnbd loop active');
        window.setTimeout(() => {
          revealFullArchive();
        }, 1800);
      }).catch((err) => {
        console.error('DNBD start failed', err);
        setStatus('audio blocked / click or drag again');
        state.audioStarted = false;
      });
    }

    function fadeAudio(audioEl, from, to, duration, onDone) {
      const start = performance.now();
      function step(now) {
        const progress = Math.min((now - start) / duration, 1);
        audioEl.volume = from + (to - from) * progress;
        if (progress < 1) {
          requestAnimationFrame(step);
        } else if (onDone) {
          onDone();
        }
      }
      requestAnimationFrame(step);
    }

    function forceDNBDHandoff() {
      if (dnbdIsCrossfading) return;

      const active = dnbdActiveDeck === 'A' ? audioBedEl : audioLayerAEl;
      const next = dnbdActiveDeck === 'A' ? audioLayerAEl : audioBedEl;

      dnbdIsCrossfading = true;
      next.pause();
      next.currentTime = 0;
      next.volume = 0;
      next.muted = false;

      next.play().then(() => {
        fadeAudio(next, 0, 0.26, 600);
        fadeAudio(active, active.volume, 0, 600, () => {
          active.pause();
          active.currentTime = 0;
        });
        window.setTimeout(() => {
          dnbdActiveDeck = dnbdActiveDeck === 'A' ? 'B' : 'A';
          dnbdIsCrossfading = false;
        }, 650);
      }).catch(() => {
        dnbdIsCrossfading = false;
      });
    }
    function startDNBDCrossfadeLoop() {
      if (dnbdCrossfadeInterval) {
        clearInterval(dnbdCrossfadeInterval);
      }

      dnbdCrossfadeInterval = window.setInterval(() => {
        const active = dnbdActiveDeck === 'A' ? audioBedEl : audioLayerAEl;
        const next = dnbdActiveDeck === 'A' ? audioLayerAEl : audioBedEl;

        if (dnbdIsCrossfading) return;
        if (!active.duration || !isFinite(active.duration)) return;

        const remaining = active.duration - active.currentTime;
        if (remaining <= 6.5) {
          dnbdIsCrossfading = true;
          next.pause();
          next.currentTime = 0;
          next.volume = 0;
          next.muted = false;
          next.play().then(() => {
            fadeAudio(next, 0, 0.26, 5500);
            fadeAudio(active, active.volume, 0, 5500, () => {
              active.pause();
              active.currentTime = 0;
            });
            window.setTimeout(() => {
              dnbdActiveDeck = dnbdActiveDeck === 'A' ? 'B' : 'A';
              dnbdIsCrossfading = false;
            }, 5600);
          }).catch(() => {
            dnbdIsCrossfading = false;
          });
        }
      }, 250);
    }

    /* =========================
       14. STATUS HELPERS
       ========================= */
    function setStatus(text) {
      statuslineEl.textContent = text;
    }

    /* =========================
       15. INITIALIZATION
       ========================= */
    function getBootOpeningNodes() {
      return ALL_NODES.filter(node => node.id === OPENING_PRIORITY_VIDEO_ID);
    }


    function revealFullArchive() {
      const existingIds = new Set(NODE_ELEMENTS.keys());
      const remaining = ALL_NODES.filter(node => !existingIds.has(node.id));

      const batchSize = 14;
      const batchDelay = 260;

      for (let i = 0; i < remaining.length; i += batchSize) {
        const batch = remaining.slice(i, i + batchSize);

        window.setTimeout(() => {
          batch.forEach(node => {
            const el = createNodeElement(node);
            el.style.opacity = '0';
            el.style.transition = 'opacity 700ms ease';
            worldEl.appendChild(el);
            NODE_ELEMENTS.set(node.id, el);

            requestAnimationFrame(() => {
              el.style.opacity = '1';
            });
          });

          renderCamera();
          startVisibleVideos();
        }, (i / batchSize) * batchDelay);
      }
    }
    function initWorldSurface() {
      worldEl.style.width = `${WORLD_WIDTH}px`;
      worldEl.style.height = `${WORLD_HEIGHT}px`;
    }

    function initArchiveWorld() {
      initWorldSurface();
      initAudioSources();

      CORE_NODES = createCoreNodes();
      ECHO_NODES = generateEchoNodes(CORE_NODES);
      ALL_NODES = [...CORE_NODES, ...ECHO_NODES];

      renderAllNodes(getBootOpeningNodes());
      bindInteraction();
      centerCameraOnCoreCluster();
      renderCamera();
      startVisibleVideos();
      setStatus('signal present / touch to engage dnbd loop');
    }

    initArchiveWorld();
  </script>
